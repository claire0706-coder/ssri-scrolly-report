<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>林小姐的故事｜小討主席開場</title>
    <meta name="description" content="精神疾病單元小組討論主席開場用翻書式病例引導。">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="stage" aria-label="林小姐病例翻書式開場">
      <section class="book" aria-live="polite">
        <div class="book-spine" aria-hidden="true"></div>

        <article class="page page-left" aria-label="故事頁左側">
          <div class="page-content" id="left-page"></div>
        </article>

        <article class="page page-right" aria-label="故事頁右側">
          <div class="page-content" id="right-page"></div>
        </article>
      </section>

      <section class="controls" aria-label="翻頁控制">
        <button id="prev" type="button" aria-label="上一頁">← 上一頁</button>
        <div class="progress">
          <span id="page-label">1 / 6</span>
          <div class="progress-track" aria-hidden="true">
            <span id="progress-fill"></span>
          </div>
        </div>
        <button id="next" type="button" aria-label="下一頁">下一頁 →</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
